<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Bubble Pop Quest - Browser Preview</title>
  <style>
    :root {
      --purple-1: #b8adff;
      --purple-2: #8171f1;
      --purple-3: #6346d8;
      --purple-4: #33106f;
      --panel: rgba(238, 240, 255, .92);
      --panel-line: #938bdc;
      --ink: #272166;
      --gold: #ffce28;
      --green: #52d622;
      --red: #f04a45;
      --blue: #1597f2;
      --shadow: 0 12px 26px rgba(39, 18, 117, .35);
      --soft-shadow: 0 5px 12px rgba(31, 11, 93, .28);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 0%, #8778ff 0, #6d52dc 42%, #21104b 100%);
      font-family: "Arial Rounded MT Bold", "Trebuchet MS", Arial, sans-serif;
      color: white;
      user-select: none;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
      touch-action: manipulation;
    }

    .phone {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      max-width: 500px;
      margin: 0 auto;
      overflow: hidden;
      background:
        radial-gradient(circle at 24% 14%, rgba(255,255,255,.42) 0 2px, transparent 3px),
        radial-gradient(circle at 70% 9%, rgba(255,255,255,.3) 0 1px, transparent 3px),
        linear-gradient(160deg, rgba(255,255,255,.18), transparent 34%),
        linear-gradient(180deg, var(--purple-1), var(--purple-2) 45%, #6f55df);
      box-shadow: 0 0 70px rgba(0,0,0,.42);
    }

    .phone::before,
    .phone::after {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      height: 28%;
      border-radius: 50%;
      background: rgba(255,255,255,.13);
      filter: blur(.2px);
      pointer-events: none;
    }

    .phone::before { top: 15%; transform: rotate(-8deg); }
    .phone::after { bottom: 15%; transform: rotate(9deg); }

    #game {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    #uiRoot {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
      padding: 14px;
      pointer-events: auto;
      animation: panelIn .2s ease-out both;
    }

    .screen.active { display: block; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 48px;
      position: relative;
      z-index: 3;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-height: 34px;
      padding: 4px 9px;
      color: white;
      font-weight: 900;
      text-shadow: 0 2px 3px rgba(0,0,0,.35);
      border-radius: 18px;
      background: linear-gradient(#4d3f9b, #2f236c);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: var(--soft-shadow), inset 0 1px rgba(255,255,255,.3);
    }

    .round {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,.35);
      background: linear-gradient(#a895ff, #5a3dcd);
      border: 2px solid rgba(255,255,255,.45);
      box-shadow: var(--soft-shadow), inset 0 3px rgba(255,255,255,.25);
    }

    .plus {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      line-height: 1;
      background: linear-gradient(#95ff46, #28b815);
      box-shadow: 0 3px 0 #167d13, 0 5px 10px rgba(0,0,0,.25), inset 0 2px rgba(255,255,255,.45);
    }

    .icon {
      display: inline-grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      color: white;
      font-size: 20px;
      text-shadow: 0 2px 3px rgba(0,0,0,.25);
    }

    .coin { background: radial-gradient(circle at 35% 25%, #fff49a, #ffbf18 55%, #df7b00); border: 2px solid #fff07a; color: #b96400; }
    .heart { color: #ff393f; filter: drop-shadow(0 2px 2px rgba(0,0,0,.3)); font-size: 29px; }
    .star { color: #ffc624; filter: drop-shadow(0 2px 1px #a94b00); }

    .logo-wrap {
      position: absolute;
      left: 50%;
      top: 14%;
      width: min(84vw, 390px);
      transform: translateX(-50%);
      text-align: center;
      animation: logoPop .45s cubic-bezier(.2,1.25,.45,1) both;
    }

    .logo {
      position: relative;
      display: inline-block;
      font-size: clamp(42px, 13vw, 68px);
      line-height: .82;
      letter-spacing: 0;
      color: #ffe23a;
      -webkit-text-stroke: 3px #9a4200;
      text-shadow: 0 4px #6d2a9c, 0 8px 0 #0b75bd, 0 12px 15px rgba(0,0,0,.35);
    }

    .logo span {
      display: block;
      color: #35ddff;
      -webkit-text-stroke-color: #09539b;
      text-shadow: 0 4px #063a89, 0 8px 11px rgba(0,0,0,.3);
    }

    .orb {
      position: absolute;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 28% 22%, #fff, #4d5dff 25%, #071bbb 70%);
      box-shadow: inset -6px -8px 8px rgba(0,0,0,.2), 0 4px 8px rgba(0,0,0,.25);
      animation: floaty 2.8s ease-in-out infinite;
    }

    .orb.red { background: radial-gradient(circle at 28% 22%, #fff, #ff462f 30%, #b91111 76%); }
    .orb.yellow { background: radial-gradient(circle at 28% 22%, #fff, #ffeb3f 32%, #d78900 76%); }
    .orb.green { background: radial-gradient(circle at 28% 22%, #fff, #28ee5d 32%, #119426 76%); }
    .orb.magenta { background: radial-gradient(circle at 28% 22%, #fff, #e93dff 32%, #8a19b7 76%); }

    .home-actions {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: 36px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .home-actions .wide { grid-column: span 2; }

    .btn {
      min-height: 62px;
      border-radius: 13px;
      color: white;
      font-size: 15px;
      font-weight: 950;
      text-transform: uppercase;
      text-shadow: 0 2px 2px rgba(0,0,0,.32);
      background: linear-gradient(#cf5bff, #7923ca 48%, #5b14b3);
      border: 2px solid rgba(255,255,255,.32);
      box-shadow: 0 6px 0 #3c0d8f, var(--shadow), inset 0 3px rgba(255,255,255,.28);
      transition: transform .08s ease, filter .12s ease;
    }

    .btn:active { transform: translateY(4px) scale(.98); box-shadow: 0 2px 0 #3c0d8f, var(--soft-shadow), inset 0 3px rgba(255,255,255,.25); }
    .btn.green { background: linear-gradient(#b4ff50, #4bd51a 50%, #2aac0b); box-shadow: 0 6px 0 #137c08, var(--shadow), inset 0 3px rgba(255,255,255,.35); }
    .btn.red { background: linear-gradient(#ff7a64, #ed3b2f 50%, #bc1d20); box-shadow: 0 6px 0 #8f1017, var(--shadow), inset 0 3px rgba(255,255,255,.32); }
    .btn.blue { background: linear-gradient(#5ed2ff, #2286ef 50%, #1264c1); box-shadow: 0 6px 0 #0a438d, var(--shadow), inset 0 3px rgba(255,255,255,.32); }
    .btn.orange { background: linear-gradient(#ffcf49, #ff8617 50%, #d35c00); box-shadow: 0 6px 0 #9b3f00, var(--shadow), inset 0 3px rgba(255,255,255,.36); }

    .panel {
      position: relative;
      color: var(--ink);
      background: linear-gradient(#f8f8ff, #d9dcff);
      border: 2px solid rgba(255,255,255,.7);
      border-radius: 12px;
      box-shadow: var(--shadow), inset 0 1px rgba(255,255,255,.85);
    }

    .ribbon {
      min-width: 210px;
      margin: 0 auto 12px;
      padding: 11px 20px;
      color: white;
      text-align: center;
      font-size: 23px;
      font-weight: 950;
      text-transform: uppercase;
      background: linear-gradient(#b167ff, #7424d3);
      border-radius: 8px;
      border: 2px solid rgba(255,255,255,.3);
      box-shadow: 0 5px 0 #50159b, var(--soft-shadow), inset 0 2px rgba(255,255,255,.35);
      text-shadow: 0 2px 2px rgba(0,0,0,.35);
    }

    .close, .back {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: white;
      font-size: 24px;
      font-weight: 950;
      background: linear-gradient(#b39fff, #6749d6);
      border: 2px solid rgba(255,255,255,.5);
      box-shadow: var(--soft-shadow), inset 0 2px rgba(255,255,255,.35);
    }

    .screen-title {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }

    .mission-list, .store-grid, .daily-grid {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }

    .mission-card {
      display: grid;
      grid-template-columns: 48px 1fr 72px;
      gap: 10px;
      align-items: center;
      min-height: 85px;
      padding: 10px;
    }

    .tag {
      display: inline-block;
      min-width: 74px;
      padding: 4px 9px;
      color: white;
      font-size: 12px;
      font-weight: 950;
      text-align: center;
      border-radius: 8px;
      background: linear-gradient(#79ee41, #33b914);
      text-shadow: 0 1px 2px rgba(0,0,0,.35);
    }

    .tag.medium { background: linear-gradient(#ffb13f, #ef6a12); }
    .tag.hard { background: linear-gradient(#ff665b, #c91f2c); }

    .progress {
      height: 14px;
      overflow: hidden;
      border-radius: 10px;
      background: #2d2f8d;
      box-shadow: inset 0 2px 3px rgba(0,0,0,.35);
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #27d4ff, #1476e8);
      box-shadow: inset 0 2px rgba(255,255,255,.5);
    }

    .level-path {
      position: absolute;
      inset: 172px 14px 10px;
      pointer-events: none;
    }

    .map-road {
      position: absolute;
      left: 30%;
      top: 0;
      width: 46%;
      height: 100%;
      opacity: .48;
      border-radius: 48% 54% 45% 55%;
      background: linear-gradient(180deg, transparent 0 4%, rgba(106, 90, 222, .78) 4% 96%, transparent 96%),
        radial-gradient(120% 20% at 10% 12%, transparent 0 44%, #6a5ade 45% 68%, transparent 69%),
        radial-gradient(120% 20% at 90% 24%, transparent 0 44%, #6a5ade 45% 68%, transparent 69%);
      filter: blur(.1px);
      transform: skewY(-4deg);
    }

    .map-mission {
      position: relative;
      display: grid;
      grid-template-columns: 1fr 54px;
      gap: 10px;
      align-items: center;
      min-height: 96px;
      margin-top: 22px;
      padding: 13px 12px 13px 104px;
    }

    .map-mission .tag {
      position: absolute;
      left: 28px;
      top: 0;
      transform: translateY(-1px);
      border-radius: 0 0 8px 8px;
      min-width: 86px;
    }

    .map-star {
      position: absolute;
      left: 30px;
      bottom: 14px;
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      color: #ffd43a;
      font-size: 58px;
      filter: drop-shadow(0 3px 1px #b85c00);
    }

    .map-mission-copy b {
      display: block;
      margin-bottom: 7px;
      color: var(--ink);
      font-size: 22px;
      text-align: center;
    }

    .map-mission-copy small {
      display: block;
      margin-top: -17px;
      color: white;
      font-weight: 950;
      text-align: center;
      text-shadow: 0 1px 2px rgba(0,0,0,.45);
    }

    .map-drop {
      position: absolute;
      left: 50%;
      bottom: -22px;
      width: 76px;
      height: 42px;
      transform: translateX(-50%);
      border-radius: 19px;
      color: white;
      font-size: 36px;
      line-height: 20px;
      background: linear-gradient(#48c8ff, #0d80dc);
      box-shadow: 0 5px 0 #075a9d, var(--soft-shadow), inset 0 2px rgba(255,255,255,.4);
      z-index: 4;
    }

    .side-offers {
      position: absolute;
      top: 260px;
      left: 18px;
      width: 108px;
      display: grid;
      gap: 34px;
      z-index: 3;
    }

    .side-offers.right {
      left: auto;
      right: 18px;
      top: 276px;
      gap: 78px;
    }

    .map-offer {
      min-height: 82px;
      color: white;
      font-weight: 950;
      text-shadow: 0 2px 3px rgba(0,0,0,.35);
      background: transparent;
      position: relative;
      padding: 0;
    }

    .map-offer span {
      display: grid;
      place-items: center;
      width: 78px;
      height: 78px;
      margin: 0 auto -18px;
      border-radius: 50%;
      color: rgba(255,255,255,.82);
      font-size: 35px;
      background: rgba(91, 80, 190, .38);
      border: 3px solid rgba(255,255,255,.26);
      box-shadow: inset 0 4px 10px rgba(255,255,255,.18);
    }

    .map-offer b {
      display: block;
      min-height: 34px;
      padding: 7px 8px;
      border-radius: 12px;
      background: linear-gradient(#45c8ff, #0784df 60%, #0262b6);
      box-shadow: 0 5px 0 #074c90, var(--soft-shadow), inset 0 2px rgba(255,255,255,.45);
      font-size: 13px;
    }

    .map-offer small {
      display: block;
      margin-top: 7px;
      font-size: 14px;
    }

    .map-offer.right b { background: linear-gradient(#62cfff, #088be5 60%, #0568bb); }

    .level-node {
      position: absolute;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      color: white;
      font-weight: 950;
      background: radial-gradient(circle at 34% 24%, #ff84ff, #a620d1 55%, #65108d);
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: 0 5px 0 #4a116c, var(--soft-shadow), inset 0 3px rgba(255,255,255,.38);
      pointer-events: auto;
      display: grid;
      place-items: center;
      padding: 0;
      text-shadow: 0 2px 3px rgba(0,0,0,.35);
    }

    .level-node.current { animation: pulse 1.1s ease-in-out infinite; background: radial-gradient(circle at 34% 24%, #ffe95f, #d93cff 60%, #7c16aa); }
    .level-node.locked { filter: grayscale(.75); opacity: .72; }

    .level-node b {
      position: relative;
      z-index: 2;
      font-size: 19px;
      margin-top: 10px;
    }

    .node-stars {
      position: absolute;
      top: -18px;
      left: 50%;
      width: 76px;
      transform: translateX(-50%);
      color: #ffe647;
      font-size: 22px;
      letter-spacing: 0;
      filter: drop-shadow(0 2px 1px #a74700);
      z-index: 3;
    }

    .side-tools {
      position: absolute;
      top: 58px;
      left: 8px;
      display: grid;
      gap: 9px;
      pointer-events: auto;
      z-index: 5;
    }

    .tool {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      color: #063e87;
      font-size: 24px;
      font-weight: 950;
      background: linear-gradient(#66d8ff, #1a8af2);
      border: 2px solid rgba(255,255,255,.42);
      box-shadow: 0 4px 0 #0b5aa5, var(--soft-shadow), inset 0 2px rgba(255,255,255,.4);
    }

    .game-hud {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
    }

    .game-hud.active { display: block; }

    .game-top {
      position: absolute;
      top: 7px;
      left: 7px;
      right: 7px;
      height: 42px;
      display: grid;
      grid-template-columns: 44px 1fr 68px;
      gap: 8px;
      align-items: center;
      pointer-events: auto;
    }

    .stars {
      height: 34px;
      border-radius: 18px;
      background: rgba(38, 24, 91, .76);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,.35);
    }

    .powerbar {
      position: absolute;
      left: 48px;
      right: 48px;
      bottom: 14px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      pointer-events: auto;
    }

    .power {
      position: relative;
      height: 52px;
      border-radius: 8px;
      font-size: 22px;
      color: white;
      background: linear-gradient(#b9d4ff, #6975e3);
      border: 2px solid rgba(255,255,255,.55);
      box-shadow: 0 4px 0 #4d4db0, var(--soft-shadow), inset 0 2px rgba(255,255,255,.4);
    }

    .badge {
      position: absolute;
      right: -7px;
      bottom: -7px;
      min-width: 25px;
      height: 25px;
      padding: 0 5px;
      border-radius: 13px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 13px;
      font-weight: 950;
      background: linear-gradient(#ff4abd, #c21d84);
      border: 2px solid white;
      text-shadow: 0 1px 2px rgba(0,0,0,.35);
    }

    .ready { animation: pulse 1s ease-in-out infinite; filter: saturate(1.35); }

    .daily-grid {
      grid-template-columns: repeat(3, 1fr);
      margin-top: 8px;
    }

    .day {
      min-height: 88px;
      padding: 7px 5px;
      text-align: center;
      font-size: 12px;
      font-weight: 950;
    }

    .day.active {
      background: linear-gradient(#bdff79, #60d725);
      color: #174c10;
    }

    .spin-wheel {
      position: relative;
      width: min(82vw, 360px);
      aspect-ratio: 1;
      margin: 12px auto;
      border-radius: 50%;
      background: conic-gradient(#f05355 0 45deg, #ff9630 45deg 90deg, #9bdc34 90deg 135deg, #19a8ed 135deg 180deg, #8754e8 180deg 225deg, #ee44c1 225deg 270deg, #ffd532 270deg 315deg, #6edc35 315deg 360deg);
      border: 10px solid #ffc637;
      box-shadow: 0 7px 0 #b96b00, var(--shadow), inset 0 0 18px rgba(255,255,255,.55);
      transition: transform 2.4s cubic-bezier(.12,.85,.22,1);
    }

    .spin-wheel::after {
      content: "◉";
      position: absolute;
      inset: 36%;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #19a8ed;
      font-size: 44px;
      background: radial-gradient(#ffe85b, #ffb51f);
      border: 4px solid #fff3a6;
    }

    .pointer {
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 36px solid #ffe33b;
      margin: -4px auto -20px;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.28));
      position: relative;
      z-index: 2;
    }

    .store-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .pack {
      min-height: 170px;
      padding: 10px;
      text-align: center;
    }

    .pack .coins-stack {
      font-size: 48px;
      line-height: 1;
      margin: 6px 0;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,.22));
    }

    .settings-list {
      display: grid;
      gap: 12px;
      padding: 16px;
      margin-top: 12px;
    }

    .setting-row {
      display: grid;
      grid-template-columns: 34px 1fr 64px;
      align-items: center;
      gap: 9px;
      color: var(--ink);
      font-weight: 900;
      min-height: 40px;
      border-bottom: 1px solid rgba(88, 80, 160, .25);
    }

    .toggle {
      height: 28px;
      border-radius: 16px;
      padding: 3px;
      background: linear-gradient(#65db36, #2dae18);
      box-shadow: inset 0 2px 3px rgba(0,0,0,.22);
    }

    .toggle.off { background: linear-gradient(#b5b5d2, #737392); }
    .toggle::after {
      content: "";
      display: block;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: white;
      margin-left: auto;
      box-shadow: 0 2px 4px rgba(0,0,0,.28);
    }
    .toggle.off::after { margin-left: 0; }

    .modal {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(19, 12, 60, .5);
      pointer-events: auto;
      z-index: 20;
    }
    .modal.active { display: flex; }

    .dialog {
      width: min(92vw, 410px);
      padding: 16px;
      text-align: center;
      animation: popIn .18s ease-out both;
    }

    .dialog h2 {
      margin: 0 0 8px;
      color: #ffec4f;
      font-size: 29px;
      text-shadow: 0 3px #a94705, 0 5px 8px rgba(0,0,0,.28);
    }

    .dialog p {
      margin: 8px 0 14px;
      color: var(--ink);
      font-weight: 900;
      line-height: 1.35;
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    @keyframes logoPop {
      from { transform: translateX(-50%) scale(.72); opacity: 0; }
      to { transform: translateX(-50%) scale(1); opacity: 1; }
    }
    @keyframes panelIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes popIn {
      from { transform: scale(.82); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @media (min-width: 620px) {
      .phone {
