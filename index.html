<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- SPLASH -->
  <div id="splashScreen" class="screen splash" style="justify-content: center; align-items: center; background: linear-gradient(180deg, #7b6cff, #fff); position: absolute; inset: 0; z-index: 1000;">
    <h1 style="font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 8px 0 #5a4bd6;">BUBBLE</h1>
    <h1 style="font-size: 35px; font-weight: 900; color: #ffcf3e; text-shadow: 0 6px 0 #d49e00;">SHOOTER</h1>
  </div>

  <!-- FOREST MAP SCREEN (EXACT COPY) -->
  <div id="mapScreen" class="screen hidden map-screen">
    
    <header class="map-top-bar">
      <div class="map-pill">❤️ 5 <span>FULL</span></div>
      <div class="map-pill coins">🪙 <span id="map-coins">1250</span> <div class="add-btn">+</div></div>
      <button class="gear-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>

    <div class="world-card-wrap">
      <div class="world-card">
        <h2>GREEN FOREST</h2>
        <div class="world-progress">
          <div class="fill"></div>
          <span style="z-index: 1;">30/90</span>
        </div>
      </div>
    </div>

    <div class="map-scroller" id="mapScrollArea">
      <div class="winding-path" id="levelPath">
        <!-- Nodes generated via JS -->
      </div>
    </div>

    <footer class="bottom-tab-bar">
      <div class="tab-item" onclick="showScreen('splashScreen')"><i>🏠</i><span>HOME</span></div>
      <div class="tab-item active"><i>🗺️</i><span>MAP</span></div>
      <div class="tab-item" onclick="toggleShop()"><i>🛒</i><span>SHOP</span></div>
    </footer>
  </div>

  <!-- GAMEPLAY SCREEN (PREVIOUS PIXEL-PERFECT FIX) -->
  <div id="gameplayScreen" class="screen hidden game-play-bg">
    <header class="top-hud">
      <button class="hud-btn" onclick="showScreen('mapScreen')">⏸</button>
      <div class="stat-card">
        <span>SCORE</span>
        <h3 id="score">2,450</h3>
        <div style="height: 6px; background: #eee; border-radius: 10px; margin-top: 5px;"><div style="height: 100%; width: 40%; background: #ffcf3e; border-radius: 10px;"></div></div>
      </div>
      <div class="stat-card" style="display: flex; align-items: center; gap: 10px;">
        <div style="text-align: left;">
            <span>GOAL</span>
            <div style="display: flex; align-items: center; gap: 5px;">
                <div style="width: 25px; height: 25px; background: radial-gradient(circle at 8px 8px, #e1baff, #c76bff); border-radius: 50%;"></div>
                <h3 id="goal-val" style="font-size: 18px;">0/6</h3>
            </div>
        </div>
      </div>
      <button class="hud-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>
    <canvas id="gameCanvas" width="390" height="420"></canvas>
    <footer class="bottom-shooter">
      <div class="shooter-controls">
        <div class="pu-item"><img src="https://img.icons8.com/color/96/bomb.png" alt="bomb"><span class="badge">2</span></div>
        <div class="main-ball-circle">
          <div id="currentBall" class="ball-current"></div>
          <div class="swap-small-btn" onclick="swapBubbles()"><div id="nextBall" class="ball-next"></div><span style="position: absolute; right: -5px; bottom: -5px; font-size: 8px;">🔄</span></div>
        </div>
        <div class="pu-item"><img src="https://img.icons8.com/color/96/rainbow.png" alt="rainbow"><span class="badge">1</span></div>
      </div>
    </footer>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
