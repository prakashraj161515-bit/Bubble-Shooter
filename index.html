<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- 1. MAP SCREEN (SAME AS BEFORE) -->
  <div id="mapScreen" class="screen hidden map-screen">
    <header class="map-header-pro">
      <div class="hud-item">❤️ 5 <span>FULL</span></div>
      <div class="hud-item gold">🪙 <span id="map-coins">1250</span> <div class="plus-btn">+</div></div>
      <button class="set-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>
    <div class="map-view" id="mapScrollArea"><div class="path-canvas" id="levelPath"></div></div>
    <footer class="bottom-nav-pro">
      <div class="nav-item"><i>🏠</i>HOME</div>
      <div class="nav-item active"><i>🗺️</i>MAP</div>
      <div class="nav-item"><i>🛒</i>SHOP</div>
    </footer>
  </div>

  <!-- 2. GAMEPLAY SCREEN (EXACT COPY OF PHOTO) -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    
    <header class="hud-top">
      <button class="hud-round-btn" onclick="showScreen('mapScreen')">⏸</button>
      
      <div class="panel-score">
        <span>SCORE</span>
        <h3 id="score">2,450</h3>
        <div class="star-track">
          <div class="fill"></div>
          <span style="position: absolute; left: 35%; top: -5px; font-size: 10px;">⭐</span>
        </div>
      </div>

      <div class="panel-goal">
        <div style="text-align: center;">
          <span style="font-size: 8px; font-weight: 800; color: #aaa;">GOAL</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <div class="goal-bubble-icon"></div>
            <h3 id="goal-val" style="font-size: 20px; color: #4a4a8c;">0/6</h3>
          </div>
        </div>
      </div>

      <button class="hud-round-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>

    <canvas id="gameCanvas" width="390" height="450"></canvas>

    <footer class="hud-bottom">
      <div class="wave-top"></div>
      
      <div class="hud-controls">
        <!-- Powerup Left -->
        <div class="powerup-box">
          <img src="https://img.icons8.com/color/96/bomb.png" alt="bomb">
          <span class="badge-num">2</span>
        </div>

        <!-- Main Shooter -->
        <div class="main-cannon">
          <div id="currentBall" class="current-ball-view"></div>
          <div class="swap-indicator" onclick="swapBubbles()">
            <div id="nextBall" class="red-ball-small"></div>
            <img class="swap-arrows" src="https://img.icons8.com/ios-glyphs/60/7b6cff/synchronize.png" alt="swap">
          </div>
        </div>

        <!-- Powerup Right -->
        <div class="powerup-box">
          <img src="https://img.icons8.com/color/96/rainbow.png" alt="rainbow">
          <span class="badge-num">1</span>
        </div>
      </div>
    </footer>

  </div>

  <!-- OVERLAYS -->
  <div id="settingsScreen" class="screen hidden overlay" style="display:none;">...</div>

</div>

<script src="game.js"></script>
</body>
</html>
