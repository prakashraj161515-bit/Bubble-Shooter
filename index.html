<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- MAP SCREEN (RESTORED FOREST) -->
  <div id="mapScreen" class="screen map-screen">
    <header class="hud-top-premium" style="background:#fff; padding: 50px 20px 15px;">
      <div class="hud-item" style="background:#eef2ff; padding:8px 15px; border-radius:20px; font-weight:800;">❤️ 5 <span>FULL</span></div>
      <div class="hud-item" style="background:#eef2ff; padding:8px 15px; border-radius:20px; font-weight:800; color:#ffb300;">🪙 <span id="map-coins">1250</span></div>
      <button class="hud-btn-p" style="width:45px; height:45px;" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>
    <div class="map-scroller" id="mapScrollArea"><div id="levelPath" style="position:relative;"></div></div>
    
    <!-- Focus Current Level Button -->
    <button id="focusCurrentBtn" class="focus-current-btn hidden" onclick="scrollToCurrentLevel()">
      <svg id="focusArrow" viewBox="0 0 24 24" fill="white" width="30" height="30" style="transition: transform 0.3s;">
          <path d="M20 12l-1.41-1.41L13 16.17V4h-2v12.17l-5.58-5.59L4 12l8 8 8-8z"/>
      </svg>
    </button>
    
    <footer style="height:90px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #eee;">
      <div style="text-align:center; color:#aaa; font-size:10px; font-weight:800;"><i>🏠</i><br>HOME</div>
      <div style="text-align:center; color:#7b6cff; font-size:10px; font-weight:800;"><i>🗺️</i><br>MAP</div>
      <div style="text-align:center; color:#aaa; font-size:10px; font-weight:800;"><i>🛒</i><br>SHOP</div>
    </footer>
  </div>

  <!-- GAMEPLAY SCREEN (THE PHOTO CLONE) -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    
    <header class="hud-top-premium">
      <button class="hamburger-btn" onclick="showScreen('mapScreen')">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
      </button>

      <div class="star-progress-track">
        <div class="star-progress-fill" style="width: 45%;"></div>
        <div class="star-wrapper" style="left: 33%;"><div class="p-star active">★</div></div>
        <div class="star-wrapper" style="left: 66%;"><div class="p-star">★</div></div>
        <div class="star-wrapper" style="left: 100%;"><div class="p-star">★</div></div>
      </div>

      <div class="score-pill">
        <h3 id="score">2450</h3>
      </div>
    </header>

    <canvas id="gameCanvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;"></canvas>

    <footer class="hud-bottom-p">
      <div class="ammo-pill" id="ammo-val">55</div>
      
      <div class="shooter-row">
        <div class="main-ball-wrap">
          <div id="currentBall" class="cannon-ball-p" style="width:58px; height:58px;"></div>
          <div class="bubble-star-p" style="font-size: 32px;">✶</div>
        </div>
        <div class="reserve-ball-wrap" onclick="swapBubbles()">
          <div id="nextBall" class="cannon-ball-p" style="width:38px; height:38px;"></div>
          <div class="bubble-star-p" style="font-size: 24px;">✶</div>
          <!-- Slimmer & Swirly (Ghumaodar) Light Purple Arrows -->
          <svg class="swap-arrows" viewBox="0 0 100 100">
            <path d="M35,30 Q50,20 65,30" fill="none" stroke="rgba(214, 186, 255, 0.7)" stroke-width="5" stroke-linecap="round" />
            <path d="M62,25 L68,32 L58,35" fill="none" stroke="rgba(214, 186, 255, 0.7)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M65,70 Q50,80 35,70" fill="none" stroke="rgba(214, 186, 255, 0.7)" stroke-width="5" stroke-linecap="round" />
            <path d="M38,75 L32,68 L42,65" fill="none" stroke="rgba(214, 186, 255, 0.7)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </div>













      </div>

      <div class="pu-grid-p">
        <!-- Bomb -->
        <div class="pu-glass-btn pu-purple">
          <span style="font-size:42px; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.4)); margin-top: -5px;">💣</span>
          <div class="pu-badge-premium pu-badge-purple">19</div>
        </div>
        
        <!-- Aim -->
        <div class="pu-glass-btn pu-cyan">
          <svg viewBox="0 0 100 100" style="width:85%; height:85%;">
            <circle cx="20" cy="85" r="10" fill="#3ddc84" stroke="#fff" stroke-width="2"/>
            <path d="M 27,78 L 85,20 L 55,5" fill="none" stroke="#66ff66" stroke-width="6" stroke-dasharray="6,6" stroke-linecap="round"/>
            <circle cx="85" cy="20" r="6" fill="#3ddc84"/>
            <polygon points="55,5 65,10 60,20" fill="#66ff66" />
            <circle cx="20" cy="85" r="15" fill="#fff" opacity="0.3" filter="blur(3px)"/>
          </svg>
          <div class="pu-badge-premium pu-badge-green">✓</div>
        </div>
        
        <!-- Rotate -->
        <div class="pu-glass-btn pu-cyan">
          <svg viewBox="0 0 100 100" style="width:85%; height:85%;">
            <defs>
              <radialGradient id="cyG" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ccffff"/><stop offset="30%" stop-color="#00ddff"/><stop offset="100%" stop-color="#0066cc"/>
              </radialGradient>
              <radialGradient id="grG" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ccffcc"/><stop offset="30%" stop-color="#33cc33"/><stop offset="100%" stop-color="#006600"/>
              </radialGradient>
              <radialGradient id="rdG" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffcccc"/><stop offset="30%" stop-color="#ff4d4d"/><stop offset="100%" stop-color="#990000"/>
              </radialGradient>
            </defs>
            
            <!-- Fat Glossy Arrows -->
            <path d="M 65,30 A 35 35 0 0 1 75,50" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
            <polygon points="70,45 77,57 84,45" fill="rgba(255,255,255,0.8)" />

            <path d="M 60,75 A 35 35 0 0 1 35,70" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
            <polygon points="45,65 30,70 45,78" fill="rgba(255,255,255,0.8)" />

            <path d="M 20,50 A 35 35 0 0 1 35,25" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="6" stroke-linecap="round"/>
            <polygon points="28,32 38,20 42,32" fill="rgba(255,255,255,0.8)" />

            <!-- 3D Bubbles -->
            <circle cx="50" cy="20" r="15" fill="url(#cyG)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
            <circle cx="44" cy="13" r="4" fill="#fff" opacity="0.8"/>

            <circle cx="20" cy="65" r="15" fill="url(#grG)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
            <circle cx="14" cy="58" r="4" fill="#fff" opacity="0.8"/>

            <circle cx="80" cy="65" r="15" fill="url(#rdG)" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
            <circle cx="74" cy="58" r="4" fill="#fff" opacity="0.8"/>
          </svg>
          <div class="pu-badge-premium pu-badge-purple">2</div>
        </div>
        
        <!-- Fireball (Falling Comet) -->
        <div class="pu-glass-btn pu-purple">
          <svg viewBox="0 0 100 100" style="width:85%; height:85%;" class="fireball-anim">
            <defs>
              <linearGradient id="cometG" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="40%" stop-color="#88ccff"/>
                <stop offset="100%" stop-color="rgba(102, 179, 255, 0)"/>
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            
            <!-- Meteor Body / Tail -->
            <path d="M25,75 C45,85 70,50 90,10 C50,30 15,55 25,75 Z" fill="url(#cometG)" filter="url(#glow)"/>
            
            <!-- Action Streaks -->
            <path d="M15,65 L75,5" fill="none" stroke="url(#cometG)" stroke-width="3" stroke-linecap="round"/>
            <path d="M35,85 L95,25" fill="none" stroke="url(#cometG)" stroke-width="3" stroke-linecap="round"/>
            
            <!-- Glowing Core (Head) -->
            <circle cx="30" cy="70" r="12" fill="#fff" filter="url(#glow)"/>
            <circle cx="30" cy="70" r="8" fill="#ccffff"/>
          </svg>
          <div class="pu-badge-premium pu-badge-purple">13</div>
        </div>
      </div>
    </footer>


  </div>

</div>

<script src="game.js"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
.points { position:absolute; color:#fff; font-size:26px; font-weight:700; pointer-events:none; text-shadow:0 2px 10px rgba(0,0,0,0.25); z-index:999; animation:floatUp 1s forwards; }
@keyframes floatUp { 0%{opacity:0;transform:translateY(0) scale(0.5)} 20%{opacity:1;transform:translateY(-10px) scale(1)} 100%{opacity:0;transform:translateY(-80px) scale(1.3)} }
.bg-particle { position:fixed; border-radius:50%; background:rgba(255,255,255,0.35); filter:blur(2px); animation:floatParticle linear infinite; pointer-events:none; z-index:0; }
@keyframes floatParticle { from{transform:translateY(0px)} to{transform:translateY(-100vh)} }
.shake { animation:shake 0.25s; }
@keyframes shake { 0%{transform:translateX(0)} 25%{transform:translateX(-5px)} 50%{transform:translateX(5px)} 75%{transform:translateX(-3px)} 100%{transform:translateX(0)} }
.level-complete { position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.55); backdrop-filter:blur(10px); display:none; justify-content:center; align-items:center; }
.complete-card { width:300px; padding:35px; border-radius:36px; background:rgba(255,255,255,0.95); text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.3); }
.complete-card h1 { font-size:38px; color:#5b4dff; margin-bottom:8px; }
.complete-card p { color:#888; margin-bottom:22px; font-size:16px; }
.complete-btn { width:220px; height:60px; border:none; border-radius:20px; background:linear-gradient(to right,#ffb300,#ff7a00); color:white; font-size:20px; font-weight:700; cursor:pointer; box-shadow:0 8px 20px rgba(255,150,0,0.4); }
.failed-btn { width:220px; height:60px; border:none; border-radius:20px; background:linear-gradient(to right,#ff4d4d,#cc0000); color:white; font-size:20px; font-weight:700; cursor:pointer; box-shadow:0 8px 20px rgba(200,0,0,0.4); }
.combo-text { position:fixed; top:160px; left:50%; transform:translateX(-50%); color:#fff; font-size:38px; font-weight:800; text-shadow:0 5px 15px rgba(0,0,0,0.3); opacity:0; z-index:999; pointer-events:none; }
</style>

<!-- LEVEL COMPLETE MODAL -->
<div class="level-complete" id="levelComplete">
  <div class="complete-card">
    <h1>LEVEL CLEAR 🎉</h1>
    <p>You cleared all bubbles!</p>
    <button class="complete-btn" id="nextLevelBtn">NEXT LEVEL ▶</button>
  </div>
</div>

<!-- LEVEL FAILED MODAL -->
<div class="level-complete" id="levelFailed">
  <div class="complete-card">
    <h1 style="color:#ff4d4d;">OUT OF MOVES 😢</h1>
    <p>You didn't clear the board in time.</p>
    <button class="failed-btn" id="retryLevelBtn">TRY AGAIN ↻</button>
  </div>
</div>
<div class="combo-text" id="comboText">COMBO x3</div>

<script>
// ── Background Particles ──────────────────────────────────
(function createBgParticles(){
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='bg-particle';
    p.style.width=Math.random()*8+4+'px';
    p.style.height=p.style.width;
    p.style.left=Math.random()*100+'%';
    p.style.bottom='-20px';
    p.style.animationDuration=Math.random()*10+8+'s';
    p.style.animationDelay=Math.random()*10+'s';
    p.style.opacity=Math.random()*0.6+0.2;
    document.body.appendChild(p);
  }
})();

// ── Floating Score Popup ──────────────────────────────────
window.showPoints = function(x, y, text) {
  const div = document.createElement('div');
  div.className = 'points';
  div.innerText = text;
  div.style.left = x + 'px';
  div.style.top  = y + 'px';
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 1000);
};

// ── Screen Shake ──────────────────────────────────────────
window.screenShake = function() {
  const el = document.getElementById('gameplayScreen');
  if (!el) return;
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 250);
};

// ── Bubble Pop Particles (DOM) ────────────────────────────
window.animateBubblePop = function(x, y, color) {
  for(let i=0;i<8;i++){
    const p = document.createElement('div');
    p.style.cssText = `position:fixed;width:10px;height:10px;border-radius:50%;background:${color};left:${x}px;top:${y}px;z-index:9998;pointer-events:none;`;
    document.body.appendChild(p);
    if(window.gsap) {
      gsap.to(p, { x:(Math.random()-0.5)*120, y:(Math.random()-0.5)*120, scale:0, opacity:0, duration:0.6, onComplete:()=>p.remove() });
    } else { setTimeout(()=>p.remove(), 600); }
  }
};

// ── Combo System ──────────────────────────────────────────
let _combo = 0;
window.increaseCombo = function() {
  _combo++;
  if (_combo >= 3) {
    const el = document.getElementById('comboText');
    el.innerText = `COMBO x${_combo}`;
    if(window.gsap) {
      gsap.fromTo(el, {scale:0.4,opacity:0,y:0}, {scale:1,opacity:1,duration:0.3});
      gsap.to(el, {opacity:0,y:-40,delay:0.7,duration:0.4});
    }
  }
  clearTimeout(window._comboTimer);
  window._comboTimer = setTimeout(() => _combo = 0, 1500);
};

// ── Level Complete Modal ──────────────────────────────────
// ── Level Complete / Failed Modals ──────────────────────────
window.showLevelComplete = function() {
  const modal = document.getElementById('levelComplete');
  modal.style.display = 'flex';
  if(window.gsap) gsap.from(modal.querySelector('.complete-card'), {scale:0.5, duration:0.4, ease:'back.out(1.7)'});
};

window.showLevelFailed = function() {
  const modal = document.getElementById('levelFailed');
  modal.style.display = 'flex';
  if(window.gsap) gsap.from(modal.querySelector('.complete-card'), {scale:0.5, duration:0.4, ease:'back.out(1.7)'});
};

document.getElementById('nextLevelBtn').addEventListener('click', () => {
  document.getElementById('levelComplete').style.display = 'none';
  if(window.S) {
    S.currentLevel = Math.min(S.currentLevel + 1, 5000);
  }
  if(window.startGame) startGame();
});

document.getElementById('retryLevelBtn').addEventListener('click', () => {
  document.getElementById('levelFailed').style.display = 'none';
  if(window.startGame) startGame();
});

// ── Smooth Button Press ───────────────────────────────────
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('mousedown', () => { if(window.gsap) gsap.to(btn, {scale:0.92, duration:0.1}); });
  btn.addEventListener('mouseup',   () => { if(window.gsap) gsap.to(btn, {scale:1,    duration:0.1}); });
});
</script>
</body>
</html>
