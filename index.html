<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- 1. SPLASH -->
  <div id="splashScreen" class="screen splash">
    <div class="logo-wrap">
      <h1 class="logo-main">BUBBLE</h1>
      <h1 class="logo-sub">SHOOTER</h1>
    </div>
  </div>

  <!-- 2. MAP SCREEN (Lighter & Cleaner) -->
  <div id="mapScreen" class="screen hidden light-bg">
    <div class="map-header">
      <div class="pill">❤️ <span id="heart-status">FULL</span></div>
      <div class="pill gold">🪙 <span id="map-coins">1250</span></div>
      <button class="round-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </div>

    <div class="map-content">
      <div class="world-card">
        <h3>GREEN FOREST</h3>
        <div class="progress-bar"><div class="fill" style="width: 70%;"></div></div>
      </div>

      <div class="path-container">
        <!-- Level Nodes -->
        <div class="map-node active" style="top: 50px; right: 50px;" onclick="startGame()">4<div class="stars">⭐⭐</div></div>
        <div class="map-node done" style="top: 170px; left: 80px;" onclick="startGame()">3<div class="stars">⭐⭐⭐</div></div>
        <div class="map-node done" style="top: 290px; right: 100px;" onclick="startGame()">2<div class="stars">⭐⭐⭐</div></div>
        <div class="map-node done" style="top: 410px; left: 60px;" onclick="startGame()">1<div class="stars">⭐⭐⭐</div></div>
      </div>
    </div>

    <!-- Floating Shop Icon -->
    <div class="floating-shop" onclick="toggleShop()">
      <div class="shop-inner">🛒</div>
    </div>
  </div>

  <!-- 3. GAMEPLAY UI -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    <div class="game-hud">
      <button class="round-btn" onclick="showScreen('mapScreen')">❮</button>
      <div class="hud-box">
        <span>SCORE</span>
        <h3 id="score">0</h3>
      </div>
      <div class="hud-box" style="min-width: 100px;">
        <span>GOAL</span>
        <h3 id="goal-val">🟣 0/6</h3>
      </div>
    </div>

    <canvas id="gameCanvas" width="390" height="500"></canvas>

    <div class="cannon-area">
      <div class="shooter-wrap">
        <div class="side-pu">💣</div>
        <div class="main-ball-wrap">
          <div id="nextBall" class="next-b"></div>
          <div id="currentBall" class="current-b"></div>
          <div class="swap-icon">🔄</div>
        </div>
        <div class="side-pu">🌈</div>
      </div>
    </div>
  </div>

  <!-- 4. SHOP (Overlay) -->
  <div id="shopScreen" class="screen hidden overlay">
    <div class="modal-3d">
        <header><h1>SHOP</h1><button onclick="toggleShop()">✕</button></header>
        <div class="shop-grid">
            <div class="shop-item">💣<button>200</button></div>
            <div class="shop-item">🌈<button>200</button></div>
            <div class="shop-item">🔥<button>200</button></div>
        </div>
        <div class="coins-list">
            <div class="coin-row">🪙 500 <span>₹49</span></div>
            <div class="coin-row">🪙 1200 <span>₹99</span></div>
        </div>
    </div>
  </div>

  <!-- 5. SETTINGS -->
  <div id="settingsScreen" class="screen hidden overlay">
    <div class="modal-3d">
        <header><h1>SETTINGS</h1><button onclick="showScreen('mapScreen')">✕</button></header>
        <div class="s-list">
            <div class="s-item">🔊 Sound <div class="toggle on"></div></div>
            <div class="s-item">🎵 Music <div class="toggle on"></div></div>
        </div>
    </div>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
