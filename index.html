<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- 1. SPLASH -->
  <div id="splashScreen" class="screen splash">
    <div class="logo-wrap">
      <h1 class="logo-main">BUBBLE</h1>
      <h1 class="logo-sub">SHOOTER</h1>
    </div>
  </div>

  <!-- 2. MAP SCREEN (Lighter & Cleaner) -->
  <div id="mapScreen" class="screen hidden light-bg">
    <div class="map-header">
      <div class="pill gold">LEVEL <span id="map-coins">1</span></div>
      <button class="round-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </div>

    <div class="map-content">
      <!-- "Green Forest" icon removed as requested -->
      <div class="path-container">
        <div class="map-node active" style="top: 100px; right: 50px;" onclick="startGame()">▶<div class="stars">CHALLENGE</div></div>
        <p style="text-align: center; margin-top: 250px; font-weight: 800; color: #ccc;">INFINITE LEVELS (1 - 5000)</p>
      </div>
    </div>

    <div class="floating-shop" onclick="toggleShop()">
      <div class="shop-inner">🛒</div>
    </div>
  </div>

  <!-- 3. GAMEPLAY UI -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    <div class="game-hud">
      <button class="round-btn" onclick="showScreen('mapScreen')">❮</button>
      <div class="hud-box">
        <span>BALLS</span>
        <h3 id="ammo-val">50</h3>
      </div>
      <div class="hud-box" style="min-width: 100px;">
        <span>LEVEL</span>
        <h3 id="bomb-count">1</h3>
      </div>
    </div>

    <canvas id="gameCanvas" width="390" height="500"></canvas>

    <div class="cannon-area">
      <div class="shooter-wrap">
        <div class="side-pu">💣</div>
        <div class="main-ball-wrap">
          <div id="nextBall" class="next-b"></div>
          <div id="currentBall" class="current-b"></div>
          <div class="swap-icon">🔄</div>
        </div>
        <div class="side-pu">🌈</div>
      </div>
    </div>
  </div>

  <!-- 4. SHOP & SETTINGS (Same as before) -->
  <div id="shopScreen" class="screen hidden overlay">...</div>
  <div id="settingsScreen" class="screen hidden overlay">...</div>

</div>

<script src="game.js"></script>
</body>
</html>
