<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter - Exact UI Concept</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        
        <!-- 1. SPLASH SCREEN -->
        <div id="splash-screen" class="screen">
            <h1 class="logo-large">BUBBLE<span>SHOOTER</span></h1>
            <!-- Abstract Cannon Shape -->
            <div style="margin-top: auto; margin-bottom: 20px; text-align: center;">
                <div style="width: 80px; height: 120px; background: var(--primary-blue); border-radius: 40px 40px 0 0; display: inline-block;">
                    <div style="width: 40px; height: 40px; background: #f1c40f; border-radius: 50%; margin: -20px auto 0;"></div>
                </div>
            </div>
        </div>

        <!-- 2. HOME SCREEN (LEVEL MAP) -->
        <div id="home-screen" class="screen hidden">
            <div class="top-bar-clean">
                <div class="status-pill">❤️ FULL</div>
                <div class="status-pill">🪙 1250</div>
                <button class="btn-pause" id="settings-trigger">⚙️</button>
            </div>
            
            <div class="map-content">
                <div class="map-path">
                    <div class="level-node-blue" style="transform: translateX(-50px);">8 <div class="stars-under">⭐⭐⭐</div></div>
                    <div class="level-node-blue" style="transform: translateX(50px);">7 <div class="stars-under">⭐⭐⭐</div></div>
                    <div class="level-node-blue" style="transform: translateX(-20px);">6 <div class="stars-under">⭐⭐⭐</div></div>
                    <div class="level-node-blue" style="transform: translateX(80px); border-color: #55efc4; transform: scale(1.1) translateX(80px);">5 <div class="stars-under">⭐⭐</div></div>
                </div>
            </div>

            <div class="bottom-nav">
                <button class="nav-item"><div class="nav-item-icon">🛒</div>STORE</button>
                <button class="nav-item"><div class="nav-item-icon">📅</div>DAILY</button>
                <button class="nav-item"><div class="nav-item-icon">🎡</div>SPIN</button>
                <button class="nav-item"><div class="nav-item-icon">🎯</div>MISSIONS</button>
                <button class="nav-item"><div class="nav-item-icon">⚡</div>POWERUPS</button>
            </div>
        </div>

        <!-- 3. GAMEPLAY SCREEN -->
        <div id="gameplay-ui" class="screen hidden">
            <div class="game-header">
                <button class="btn-pause" id="back-to-home">⏸</button>
                <div class="score-bar">
                    <div class="score-fill"></div>
                </div>
                <div class="target-badge">🎯 5/6</div>
            </div>

            <canvas id="gameCanvas" style="flex: 1;"></canvas>

            <!-- LEFT SIDE POWERUPS -->
            <div class="powerup-vertical-bar">
                <div class="p-icon">💣<div class="p-badge">x2</div></div>
                <div class="p-icon">🔥<div class="p-badge">x2</div></div>
                <div class="p-icon">🌈<div class="p-badge">x2</div></div>
                <div class="p-icon">🔄<div class="p-badge">x2</div></div>
            </div>

            <div class="shooter-area">
                <div class="cannon-base">
                    <div id="active-ball" style="width: 30px; height: 30px; background: blue; border-radius: 50%;"></div>
                </div>
                <div class="balls-left-badge">
                    <small>Balls Left</small>
                    <span id="balls-text">25</span>
                </div>
            </div>
        </div>

        <!-- POPUPS -->

        <!-- 5. LEVEL COMPLETE -->
        <div id="level-complete-popup" class="overlay-dark hidden">
            <div class="card-popup" style="background: var(--dark-blue);">
                <div class="card-header-dark">
                    <div class="stars-big">⭐⭐⭐</div>
                    <h2>LEVEL 5<br>COMPLETED!</h2>
                </div>
                <div class="card-body" style="background: white;">
                    <div style="font-size: 1.5rem; font-weight: 900; color: var(--text-dark); margin-bottom: 15px;">REWARD<br>🪙 50</div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-green-large">NEXT</button>
                        <button class="btn-blue-large close-popup">HOME</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 6. OUT OF BALLS -->
        <div id="out-of-balls-popup" class="overlay-dark hidden">
            <div class="card-popup">
                <div class="card-header-dark" style="position: relative;">
                    <button class="close-round close-popup">X</button>
                    <h2>OUT OF BALLS!</h2>
                </div>
                <div class="card-body">
                    <p style="font-weight: 700; color: #555; margin-bottom: 20px;">Get 5 extra balls</p>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn-yellow-large">🪙 10</button>
                        <button class="btn-green-large">▶ WATCH AD</button>
                    </div>
                </div>
            </div>
        </div>

    </div>
    <script src="game.js"></script>
</body>
</html>
