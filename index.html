<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Shooter Premium</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        
        <!-- Splash Screen -->
        <div id="splash-screen" class="screen">
            <h1 class="logo">BUBBLE<span>SHOOTER</span></h1>
            <div class="loader-container"><div class="loader-bar"></div></div>
        </div>

        <!-- Main Menu -->
        <div id="main-menu" class="screen hidden">
            <div class="menu-header">
                <div class="coin-display">100 🪙</div>
            </div>
            <div class="menu-center">
                <h2 class="title">LEVEL 1</h2>
                <button id="play-btn" class="btn-premium">PLAY</button>
            </div>
            <div class="menu-footer">
                <button id="map-btn" class="icon-btn">🗺️</button>
                <button id="shop-btn" class="icon-btn">🛒</button>
                <button id="spin-btn" class="icon-btn">🎡</button>
            </div>
        </div>

        <!-- Gameplay UI -->
        <div id="gameplay-ui" class="screen hidden">
            <div class="mission-progress">
                <div id="mission-info" class="mission-text">Target Bubbles: 0 / 1000</div>
                <div id="mission-color-box" style="width:20px;height:20px;border-radius:50%;background:red;"></div>
            </div>

            <div class="top-bar">
                <button class="back-btn-ui">←</button>
                <div class="coin-display"><span id="game-coins">100</span> 🪙</div>
            </div>
            
            <div id="game-area">
                <canvas id="gameCanvas"></canvas>
                <div id="fx-layer"></div>
            </div>

            <div class="gameplay-footer">
                <div class="shooter-ui">
                    <div class="balls-badge">
                        <span id="balls-text">60</span>
                        <small>BALLS</small>
                    </div>
                    
                    <div class="swapper-container">
                        <div id="next-preview" class="next-preview"></div>
                        <div id="active-preview" class="active-ball-main" style="background:red;"></div>
                        <button id="swap-trigger">🔄</button>
                    </div>

                    <div class="fireball-progress-ring" id="fireball-ring" style="--progress: 0%;"></div>
                </div>

                <div class="powerup-bar">
                    <button class="p-item" id="p-fire">🔥<span>10</span></button>
                    <button class="p-item" id="p-bomb">💣<span>10</span></button>
                    <button class="p-item" id="p-rainbow">🌈<span>10</span></button>
                </div>
            </div>
        </div>

        <!-- Store, Map etc. omitted for brevity in prototype but logic remains -->
    </div>
    <script src="game.js"></script>
</body>
</html>
