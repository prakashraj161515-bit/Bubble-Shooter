<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bubble Shooter Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- 1. SPLASH SCREEN -->
        <div id="splash-screen" class="screen" style="background: white; justify-content: center; align-items: center;">
            <img src="bubble_shooter_logo_premium_1778697858318.png" class="menu-logo" alt="Logo">
            <div style="width: 30px; height: 30px; border: 3px solid rgba(0,0,0,0.05); border-top-color: var(--dark-purple); border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
        </div>

        <!-- 2. MAIN MENU -->
        <div id="main-menu" class="screen hidden">
            <div style="position: absolute; top: 20px; right: 20px;">
                <button class="btn-powerup" style="width: 40px; height: 40px;">⚙️</button>
            </div>
            
            <img src="bubble_shooter_logo_premium_1778697858318.png" class="menu-logo" alt="Logo">
            
            <div class="menu-buttons">
                <button class="btn-main btn-play" onclick="showScreen('home-screen')">▶ Play</button>
                <button class="btn-main btn-levels" onclick="showScreen('home-screen')">Levels</button>
                <button class="btn-main btn-challenge">Daily Challenge</button>
            </div>

            <div class="menu-footer">
                <button class="tab-btn" onclick="openPopup('shop-popup')"><span style="font-size: 1.8rem;">🛒</span><span>Shop</span></button>
                <button class="tab-btn" onclick="openPopup('spin-popup')"><span style="font-size: 1.8rem;">🎡</span><span>Spin</span></button>
                <button class="tab-btn"><span style="font-size: 1.8rem;">🏆</span><span>Rewards</span></button>
            </div>
        </div>

        <!-- 3. HOME SCREEN (LEVEL MAP) -->
        <div id="home-screen" class="screen hidden">
            <nav class="top-nav">
                <div class="pill-status">❤️ <span>Full</span></div>
                <div class="pill-status">🪙 <span id="header-coins">1250</span> <span style="color: var(--system-green);">+</span></div>
                <button class="btn-powerup" style="width: 34px; height: 34px; font-size: 1rem;">⚙️</button>
            </nav>

            <div class="map-view">
                <div id="map-path-container" style="display: flex; flex-direction: column-reverse; align-items: center; gap: 40px; padding-bottom: 100px;">
                    <!-- JS Generated Nodes -->
                </div>
            </div>

            <footer class="tab-bar">
                <button class="tab-btn active" onclick="showScreen('home-screen')"><span>🏠</span><span>Home</span></button>
                <button class="tab-btn" onclick="showScreen('main-menu')"><span>🗺️</span><span>Map</span></button>
                <button class="tab-btn" onclick="openPopup('shop-popup')"><span>🛍️</span><span>Shop</span></button>
            </footer>
        </div>

        <!-- 4. GAMEPLAY SCREEN -->
        <div id="gameplay-ui" class="screen hidden" style="background: linear-gradient(180deg, #d4f1ff 0%, #ffffff 100%);">
            <header class="game-header">
                <button class="btn-powerup" id="back-to-home" style="width: 36px; height: 36px; font-size: 0.9rem;">⏸</button>
                
                <div class="game-stat">
                    <div class="stat-label">Score</div>
                    <div class="stat-value" id="current-score">2,450</div>
                </div>

                <div class="goal-tracker">
                    <span id="goal-icon">🎯</span>
                    <span id="goal-text">0/6</span>
                </div>
            </header>

            <canvas id="gameCanvas" style="flex: 1;"></canvas>

            <div class="shooter-tray">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 300px;">
                    <div id="next-ball" style="width: 34px; height: 34px; border-radius: 50%; box-shadow: var(--shadow-soft);"></div>
                    
                    <div class="cannon-visual">
                        <div id="active-ball" style="width: 50px; height: 50px; border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.3);"></div>
                    </div>

                    <div style="text-align: center; background: white; padding: 5px 12px; border-radius: 15px; box-shadow: var(--shadow-soft);">
                        <div id="balls-text" style="font-size: 1.1rem; font-weight: 900; color: var(--dark-purple);">60</div>
                        <div style="font-size: 0.5rem; font-weight: 700; text-transform: uppercase;">Left</div>
                    </div>
                </div>

                <div class="powerup-row">
                    <button class="btn-powerup" onclick="usePowerup('BOMB')">💣<span class="count" id="bomb-count">2</span></button>
                    <button class="btn-powerup" onclick="usePowerup('FIREBALL')">🔥<span class="count" id="fireball-count">1</span></button>
                    <button class="btn-powerup" onclick="usePowerup('RAINBOW')">🌈<span class="count" id="rainbow-count">3</span></button>
                    <button class="btn-powerup" onclick="swapBalls()">🔄</button>
                </div>
            </div>
        </div>

        <!-- POPUPS -->
        <div id="shop-popup" class="popup-overlay hidden">
            <div class="popup-card">
                <button class="btn-close-pop" onclick="closePopup('shop-popup')">✕</button>
                <h2>Shop</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 20px;">
                        <div style="font-size: 2rem; margin-bottom: 10px;">💣</div>
                        <button class="btn-main" style="padding: 10px; font-size: 0.8rem; background: var(--grad-purple);" onclick="buyItem('BOMB', 50)">🪙 50</button>
                    </div>
                    <div style="background: #f8f9fa; padding: 15px; border-radius: 20px;">
                        <div style="font-size: 2rem; margin-bottom: 10px;">🌈</div>
                        <button class="btn-main" style="padding: 10px; font-size: 0.8rem; background: var(--grad-purple);" onclick="buyItem('RAINBOW', 50)">🪙 50</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="level-complete-popup" class="popup-overlay hidden">
            <div class="popup-card">
                <div style="font-size: 4rem;">⭐🏆⭐</div>
                <h2>Well Done!</h2>
                <p style="margin-bottom: 20px;">Level Completed</p>
                <button class="btn-main btn-play" id="next-level-btn" style="width: 100%;">Next Level</button>
            </div>
        </div>

    </div>
    <script src="game.js"></script>
    <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
</body>
</html>
