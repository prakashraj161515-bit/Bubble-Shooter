<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- FOREST MAP SCREEN (RESTORED) -->
  <div id="mapScreen" class="screen map-screen">
    <header class="map-top-bar">
      <div class="map-pill">❤️ 5 <span>FULL</span></div>
      <div class="map-pill" style="color: #ffb300;">🪙 <span id="map-coins">1250</span></div>
      <button class="hud-round-btn" style="width: 45px; height: 45px;" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>

    <div class="map-scroller" id="mapScrollArea">
      <div class="path-list" id="levelPath">
        <!-- 100 levels generated via JS -->
      </div>
    </div>

    <footer class="bottom-tab-bar">
      <div class="tab-item"><i>🏠</i><span>HOME</span></div>
      <div class="tab-item active"><i>🗺️</i><span>MAP</span></div>
      <div class="tab-item"><i>🛒</i><span>SHOP</span></div>
    </footer>
  </div>

  <!-- GAMEPLAY SCREEN (EXACT COPY) -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    <header class="hud-top">
      <button class="hud-round-btn" onclick="showScreen('mapScreen')">⏸</button>
      <div class="panel-score">
        <span>SCORE</span>
        <h3 id="score">2,450</h3>
        <div class="star-track"><div class="fill"></div></div>
      </div>
      <div class="panel-goal">
        <div style="text-align: center;">
          <span style="font-size: 8px; font-weight: 800; color: #aaa;">GOAL</span>
          <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 30px; height: 30px; background: radial-gradient(circle at 10px 10px, #e1baff, #c76bff); border-radius: 50%;"></div>
            <h3 id="goal-val" style="font-size: 20px; color: #4a4a8c;">0/6</h3>
          </div>
        </div>
      </div>
      <button class="hud-round-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>

    <canvas id="gameCanvas" width="390" height="450"></canvas>

    <footer class="hud-bottom">
      <div class="wave-top"></div>
      <div class="hud-controls">
        <div class="powerup-box">
          <img src="https://img.icons8.com/color/96/bomb.png" alt="bomb">
          <span class="badge-num">2</span>
        </div>
        <div class="main-cannon">
          <div id="currentBall" style="width: 70px; height: 70px; border-radius: 50%;"></div>
          <div style="position: absolute; bottom: -5px; right: 0; width: 40px; height: 40px; background: #fff; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 2px solid #eef2ff;" onclick="swapBubbles()">
            <div id="nextBall" style="width: 25px; height: 25px; border-radius: 50%;"></div>
          </div>
        </div>
        <div class="powerup-box">
          <img src="https://img.icons8.com/color/96/rainbow.png" alt="rainbow">
          <span class="badge-num">1</span>
        </div>
      </div>
    </footer>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
