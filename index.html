<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bubble Shooter - iOS Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- 1. SPLASH SCREEN -->
        <div id="splash-screen" class="screen">
            <h1 class="logo-large">Bubble Shooter</h1>
            <div style="margin-top: 40px;">
                <div style="width: 60px; height: 60px; border: 4px solid var(--system-blue); border-top-color: transparent; border-radius: 50%; animate: spin 1s linear infinite;"></div>
            </div>
            <style>
                @keyframes spin { to { transform: rotate(360deg); } }
            </style>
        </div>

        <!-- 2. HOME SCREEN (LEVEL MAP) -->
        <div id="home-screen" class="screen hidden">
            <div class="top-bar-clean">
                <div class="status-pill">❤️ Full</div>
                <div class="status-pill">🪙 1,250</div>
                <button class="btn-pause" id="settings-trigger">⚙️</button>
            </div>
            
            <div class="map-content">
                <div class="map-path" id="map-path-container">
                    <!-- Nodes generated by JS -->
                </div>
            </div>

            <div class="bottom-nav">
                <button class="nav-item nav-item-active"><div class="nav-item-icon">🏠</div>Home</button>
                <button class="nav-item"><div class="nav-item-icon">🛒</div>Store</button>
                <button class="nav-item"><div class="nav-item-icon">🎡</div>Spin</button>
                <button class="nav-item"><div class="nav-item-icon">🎯</div>Tasks</button>
                <button class="nav-item"><div class="nav-item-icon">⚡</div>Upgrades</button>
            </div>
        </div>

        <!-- 3. GAMEPLAY SCREEN -->
        <div id="gameplay-ui" class="screen hidden">
            <div class="game-header">
                <button class="btn-pause" id="back-to-home">✕</button>
                <div class="score-bar">
                    <div class="score-fill"></div>
                </div>
                <div class="target-badge">Clear All</div>
            </div>

            <canvas id="gameCanvas" style="flex: 1;"></canvas>

            <!-- SHOOTER & POWERUPS WRAPPER -->
            <div class="shooter-wrapper">
                <div class="shooter-top">
                    <div class="cannon-base">
                        <div id="active-ball" style="width: 34px; height: 34px; background: var(--system-blue); border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.2);"></div>
                    </div>
                    <div class="balls-left-badge">
                        <span id="balls-text">25</span>
                        <small>Left</small>
                    </div>
                </div>
                
                <div class="powerups-horizontal">
                    <div class="p-icon">💣<div class="p-badge">2</div></div>
                    <div class="p-icon">🔥<div class="p-badge">1</div></div>
                    <div class="p-icon">🌈<div class="p-badge">5</div></div>
                    <div class="p-icon">🔄<div class="p-badge">0</div></div>
                </div>
            </div>
        </div>

        <!-- POPUPS -->

        <!-- 5. LEVEL COMPLETE -->
        <div id="level-complete-popup" class="overlay-dark hidden">
            <div class="card-popup">
                <div class="card-header-dark">
                    <div class="stars-big">⭐⭐⭐</div>
                    <h2>Level Completed</h2>
                    <p style="color: var(--system-gray); margin-bottom: 20px;">You've earned 50 coins!</p>
                </div>
                <div class="card-body">
                    <button class="btn-ios btn-primary">Next Level</button>
                    <button class="btn-ios btn-secondary close-popup">Back to Menu</button>
                </div>
            </div>
        </div>

        <!-- 6. OUT OF BALLS -->
        <div id="out-of-balls-popup" class="overlay-dark hidden">
            <div class="card-popup">
                <div class="card-header-dark" style="position: relative;">
                    <button class="close-round close-popup">✕</button>
                    <h2>Out of Balls</h2>
                    <p style="color: var(--system-gray); margin-bottom: 20px;">Don't give up now!</p>
                </div>
                <div class="card-body">
                    <button class="btn-ios btn-warning">🪙 Spend 10 Coins</button>
                    <button class="btn-ios btn-success">▶ Watch Ad for +5</button>
                </div>
            </div>
        </div>

    </div>
    <script src="game.js"></script>
</body>
</html>
