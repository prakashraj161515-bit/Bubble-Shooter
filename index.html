<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- SPLASH SCREEN -->
  <div id="splashScreen" class="screen splash" style="justify-content: center; align-items: center; background: linear-gradient(180deg, #7b6cff, #fff); position: absolute; inset: 0; z-index: 1000;">
    <h1 style="font-size: 50px; font-weight: 900; color: #fff; text-shadow: 0 8px 0 #5a4bd6;">BUBBLE</h1>
    <h1 style="font-size: 35px; font-weight: 900; color: #ffcf3e; text-shadow: 0 6px 0 #d49e00;">SHOOTER</h1>
  </div>

  <!-- MAP SCREEN (Scrollable Winding Path) -->
  <div id="mapScreen" class="screen hidden light-bg">
    <div class="map-header">
      <div class="pill gold">🪙 <span id="map-coins">1250</span></div>
      <h2 style="color: #7b6cff; font-weight: 900; font-size: 18px;">LEVELS</h2>
      <button class="round-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </div>
    <div class="map-content" id="mapScrollArea">
      <div class="path-list" id="levelPath"></div>
    </div>
    <div class="floating-shop" onclick="toggleShop()"><div class="shop-inner">🛒</div></div>
  </div>

  <!-- GAMEPLAY SCREEN (THE PIXEL-PERFECT ONE) -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    
    <!-- TOP HUD -->
    <header class="game-hud">
      <button class="hud-round-btn" onclick="showScreen('mapScreen')">⏸</button>
      
      <div class="score-panel">
        <span>SCORE</span>
        <h3 id="score">2,450</h3>
        <div class="star-progress">
          <div class="fill"></div>
          <span class="mark" style="left: 40%;">⭐</span>
          <span class="mark" style="left: 70%;">⭐</span>
        </div>
      </div>

      <div class="goal-panel">
        <div style="text-align: center;">
          <span style="font-size: 8px; font-weight: 800; color: #aaa;">GOAL</span>
          <div style="display: flex; align-items: center; gap: 5px;">
            <div class="goal-bubble"></div>
            <h3 id="goal-val" style="font-size: 18px; color: #4a4a8c;">0/6</h3>
          </div>
        </div>
      </div>

      <button class="hud-round-btn" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>

    <!-- GAME CANVAS -->
    <canvas id="gameCanvas" width="390" height="480"></canvas>

    <!-- BOTTOM SHOOTER (THE WAVE) -->
    <footer class="shooter-area">
      <div class="shooter-wave"></div>
      
      <div class="controls-wrap">
        <!-- Powerup 1 -->
        <div class="pu-box">
          <img src="https://img.icons8.com/color/96/bomb.png" width="50" alt="bomb">
          <span class="pu-badge">2</span>
        </div>

        <!-- Main Shooter -->
        <div class="main-shooter">
          <div id="currentBall" class="current-ball"></div>
          <div class="swap-small" onclick="swapBubbles()">
            <div id="nextBall" class="reserve-ball"></div>
            <span style="position: absolute; right: -5px; bottom: -5px; font-size: 10px;">🔄</span>
          </div>
        </div>

        <!-- Powerup 2 -->
        <div class="pu-box">
          <img src="https://img.icons8.com/color/96/rainbow.png" width="50" alt="rainbow">
          <span class="pu-badge">1</span>
        </div>
      </div>
    </footer>

  </div>

  <!-- OVERLAYS -->
  <div id="shopScreen" class="screen hidden overlay">...</div>
  <div id="settingsScreen" class="screen hidden overlay">...</div>

</div>

<script src="game.js"></script>
</body>
</html>
