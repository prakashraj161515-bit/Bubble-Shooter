<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

  <!-- MAP SCREEN (RESTORED FOREST) -->
  <div id="mapScreen" class="screen map-screen">
    <header class="hud-top-premium" style="background:#fff; padding: 50px 20px 15px;">
      <div class="hud-item" style="background:#eef2ff; padding:8px 15px; border-radius:20px; font-weight:800;">❤️ 5 <span>FULL</span></div>
      <div class="hud-item" style="background:#eef2ff; padding:8px 15px; border-radius:20px; font-weight:800; color:#ffb300;">🪙 <span id="map-coins">1250</span></div>
      <button class="hud-btn-p" style="width:45px; height:45px;" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>
    <div class="map-scroller" id="mapScrollArea"><div id="levelPath" style="position:relative;"></div></div>
    <footer style="height:90px; background:#fff; display:flex; justify-content:space-around; align-items:center; border-top:1px solid #eee;">
      <div style="text-align:center; color:#aaa; font-size:10px; font-weight:800;"><i>🏠</i><br>HOME</div>
      <div style="text-align:center; color:#7b6cff; font-size:10px; font-weight:800;"><i>🗺️</i><br>MAP</div>
      <div style="text-align:center; color:#aaa; font-size:10px; font-weight:800;"><i>🛒</i><br>SHOP</div>
    </footer>
  </div>

  <!-- GAMEPLAY SCREEN (THE PHOTO CLONE) -->
  <div id="gameplayScreen" class="screen hidden play-bg">
    
    <header class="hud-top-premium">
      <button class="hud-btn-p" onclick="showScreen('mapScreen')">⏸</button>
      <div class="score-box-p">
        <span style="font-size:9px; font-weight:800; color:#aaa;">SCORE</span>
        <h3 id="score">2,450</h3>
        <div class="score-bar-p"><div class="fill"></div></div>
      </div>

      <button class="hud-btn-p" onclick="showScreen('settingsScreen')">⚙️</button>
    </header>

    <canvas id="gameCanvas" width="390" height="480"></canvas>

    <footer class="hud-bottom-p">
      <!-- THE SMOOTH WAVE SVG -->
      <svg class="wave-svg" viewBox="0 0 390 60" preserveAspectRatio="none">
        <path d="M0,60 L0,40 C0,40 60,0 130,0 C200,0 260,40 320,40 C380,40 390,40 390,40 L390,60 Z" />
      </svg>
      
      <div class="controls-wrap-p">
        <!-- Powerup Bomb -->
        <div class="pu-box-p">
          <img src="https://img.icons8.com/plasticine/200/bomb.png" alt="bomb">
          <span class="pu-badge-p">2</span>
        </div>

        <!-- Main Cannon -->
        <div class="cannon-wrap-p">
          <div id="currentBall" class="cannon-ball-p"></div>
          <div class="swap-box-p" onclick="swapBubbles()">
            <div id="nextBall" class="swap-ball-p"></div>
            <img class="swap-icon-p" src="https://img.icons8.com/ios-glyphs/60/7b6cff/synchronize.png" alt="swap">
          </div>
        </div>

        <!-- Powerup Rainbow -->
        <div class="pu-box-p">
          <img src="https://img.icons8.com/color/200/rainbow.png" alt="rainbow">
          <span class="pu-badge-p">1</span>
        </div>
      </div>
    </footer>

  </div>

</div>

<script src="game.js"></script>
</body>
</html>
