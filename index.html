<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bubble Shooter - iOS Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- 1. SPLASH SCREEN -->
        <div id="splash-screen" class="screen">
            <h1 class="logo-large">Bubble Shooter</h1>
            <p style="color: var(--system-gray); font-weight: 500;">Premium iOS Edition</p>
            <div class="loader-ios"></div>
        </div>

        <!-- 2. HOME SCREEN (LEVEL MAP) -->
        <div id="home-screen" class="screen hidden">
            <div class="top-bar-clean">
                <div class="status-pill">❤️ Full</div>
                <div class="status-pill"><span id="header-coins">1250</span> 🪙</div>
                <button class="btn-icon" id="settings-trigger">⚙️</button>
            </div>
            
            <div class="mission-banner">
                <div class="mission-info">
                    <span id="mission-text">Pop 50 Red Bubbles</span>
                    <div class="mission-progress-bar"><div id="mission-fill" style="width: 0%;"></div></div>
                </div>
                <div id="mission-reward">🎁</div>
            </div>

            <div class="map-content">
                <div class="map-path" id="map-path-container">
                    <!-- Nodes generated by JS -->
                </div>
            </div>

            <div class="bottom-nav">
                <button class="nav-item nav-item-active" onclick="showScreen('home-screen')"><div class="nav-item-icon">🏠</div>Home</button>
                <button class="nav-item" onclick="openPopup('shop-popup')"><div class="nav-item-icon">🛒</div>Shop</button>
                <button class="nav-item" onclick="openPopup('spin-popup')"><div class="nav-item-icon">🎡</div>Spin</button>
                <button class="nav-item"><div class="nav-item-icon">🎯</div>Tasks</button>
                <button class="nav-item"><div class="nav-item-icon">⚡</div>Items</button>
            </div>
        </div>

        <!-- 3. GAMEPLAY SCREEN -->
        <div id="gameplay-ui" class="screen hidden">
            <div class="game-header">
                <button class="btn-pause" id="back-to-home">✕</button>
                <div class="score-bar">
                    <div class="score-fill" id="game-progress-fill"></div>
                </div>
                <div class="target-badge">🎯 Level <span id="current-level-display">1</span></div>
            </div>

            <canvas id="gameCanvas" style="flex: 1;"></canvas>

            <!-- SHOOTER & POWERUPS WRAPPER -->
            <div class="shooter-wrapper">
                <div class="shooter-top">
                    <div class="cannon-base">
                        <div id="active-ball" class="ball-visual"></div>
                    </div>
                    <div class="next-ball-preview">
                        <div id="next-ball" class="ball-visual small"></div>
                    </div>
                    <div class="balls-left-badge">
                        <span id="balls-text">60</span>
                        <small>Left</small>
                    </div>
                </div>
                
                <div class="powerups-horizontal">
                    <button class="p-icon" onclick="usePowerup('BOMB')">💣<div class="p-badge" id="bomb-count">2</div></button>
                    <button class="p-icon" onclick="usePowerup('FIREBALL')">🔥<div class="p-badge" id="fireball-count">1</div></button>
                    <button class="p-icon" onclick="usePowerup('RAINBOW')">🌈<div class="p-badge" id="rainbow-count">5</div></button>
                    <button class="p-icon" onclick="swapBalls()">🔄</button>
                </div>
            </div>
        </div>

        <!-- POPUPS -->

        <!-- SHOP POPUP -->
        <div id="shop-popup" class="overlay-dark hidden">
            <div class="card-popup action-sheet">
                <button class="close-bar" onclick="closePopup('shop-popup')"></button>
                <h2>Premium Shop</h2>
                <div class="shop-grid">
                    <div class="shop-item">
                        <div class="item-icon">💣</div>
                        <div class="item-name">Bomb x3</div>
                        <button class="btn-buy" onclick="buyItem('BOMB', 50)">🪙 50</button>
                    </div>
                    <div class="shop-item">
                        <div class="item-icon">🔥</div>
                        <div class="item-name">Fire x3</div>
                        <button class="btn-buy" onclick="buyItem('FIREBALL', 50)">🪙 50</button>
                    </div>
                    <div class="shop-item">
                        <div class="item-icon">🌈</div>
                        <div class="item-name">Rainbow x3</div>
                        <button class="btn-buy" onclick="buyItem('RAINBOW', 50)">🪙 50</button>
                    </div>
                </div>
                <button class="btn-ios btn-secondary" onclick="closePopup('shop-popup')">Close</button>
            </div>
        </div>

        <!-- SPIN POPUP -->
        <div id="spin-popup" class="overlay-dark hidden">
            <div class="card-popup action-sheet">
                <button class="close-bar" onclick="closePopup('spin-popup')"></button>
                <h2>Daily Spin</h2>
                <div class="spin-wheel-container">
                    <div id="wheel" class="wheel">
                        <div class="wheel-sector">100🪙</div>
                        <div class="wheel-sector">💣</div>
                        <div class="wheel-sector">50🪙</div>
                        <div class="wheel-sector">🔥</div>
                        <div class="wheel-sector">10🪙</div>
                        <div class="wheel-sector">🌈</div>
                    </div>
                    <div class="wheel-pointer">▼</div>
                </div>
                <button id="spin-btn" class="btn-ios btn-primary" onclick="spinWheel()">Spin for Free!</button>
            </div>
        </div>

        <!-- LEVEL COMPLETE -->
        <div id="level-complete-popup" class="overlay-dark hidden">
            <div class="card-popup">
                <div class="stars-big">⭐⭐⭐</div>
                <h2>Level Completed!</h2>
                <p>Reward: <span id="level-reward-coins">50</span> 🪙</p>
                <button class="btn-ios btn-primary" id="next-level-btn">Next Level</button>
                <button class="btn-ios btn-secondary" onclick="closePopup('level-complete-popup'); showScreen('home-screen');">Home</button>
            </div>
        </div>

        <!-- OUT OF BALLS -->
        <div id="out-of-balls-popup" class="overlay-dark hidden">
            <div class="card-popup">
                <button class="close-round" onclick="closePopup('out-of-balls-popup')">✕</button>
                <h2>Out of Balls!</h2>
                <p>Keep the streak alive!</p>
                <button class="btn-ios btn-warning" onclick="buyExtraBalls()">Spend 🪙 10 (+5 Balls)</button>
                <button class="btn-ios btn-success">▶ Watch Ad (+5 Balls)</button>
            </div>
        </div>

    </div>
    <script src="game.js"></script>
</body>
</html>
