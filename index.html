<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bubble Shooter Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="hud-btn">❚❚</div>
    <div class="score-box">
      <p>SCORE</p>
      <h1 id="score">0</h1>
    </div>
    <div class="hud-btn">⚙</div>
  </div>

  <!-- Game Canvas -->
  <div class="canvas-wrap">
    <canvas id="gameCanvas" width="390" height="550"></canvas>
  </div>

  <!-- Bottom UI -->
  <div class="bottom-ui">
    <div class="shooter-controls">
      <div class="next-label">NEXT</div>
      <div class="next-bubble-wrap">
        <div id="nextBubble" class="bubble-preview"></div>
      </div>
      
      <div class="powerups">
        <div class="power">💣</div>
        <div class="power">🌈</div>
        <div class="power">⚡</div>
      </div>
    </div>
  </div>

  <!-- Win/Loss Popups -->
  <div class="popup" id="popup">
    <div class="popup-content">
        <h2 id="popup-title">Level Complete!</h2>
        <p id="popup-msg">Amazing shooting skills!</p>
        <button class="play-btn" onclick="restartGame()">PLAY AGAIN</button>
    </div>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
